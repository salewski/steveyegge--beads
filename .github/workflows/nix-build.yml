name: nix build

on:
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'default.nix'
      - 'flake.nix'
      - 'flake.lock'
  push:
    branches: [main]
    paths:
      - 'go.mod'
      - 'go.sum'
      - 'default.nix'
      - 'flake.nix'
      - 'flake.lock'
  workflow_dispatch:

jobs:
  nix-build:
    name: nix build .#default
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
      - name: Build
        run: nix build .#default --print-build-logs
